<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>室內導航系統</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body class="bg-gray-100 overflow-hidden touch-action-none">

    <div id="map-container" class="absolute inset-0 flex items-center justify-center z-0 p-4 bg-gray-900">
        <label id="upload-ui" class="flex flex-col items-center justify-center w-[90vw] md:w-full max-w-2xl h-64 md:h-96 border-4 border-dashed border-gray-500 rounded-3xl cursor-pointer hover:bg-gray-800 transition">
            <span class="text-5xl md:text-6xl mb-4">🗺️</span>
            <span class="text-xl md:text-2xl font-bold text-gray-300 text-center px-4">點擊此處上傳室內地圖</span>
            <input type="file" id="map-input" accept="image/*" class="hidden" onchange="loadMap(event)">
        </label>
        
        <div id="map-wrapper" class="hidden relative max-w-full max-h-full">
            <img id="map-image" class="max-w-full max-h-full rounded-crosshair select-none block" alt="室內地圖">
            <svg id="path-svg" class="absolute inset-0 w-full h-full pointer-events-none z-10 transition-opacity duration-500 opacity-0"></svg>
        </div>
        
        <div id="loading-overlay" class="hidden absolute inset-0 bg-gray-900 bg-opacity-80 flex flex-col items-center justify-center z-30 text-white backdrop-blur-sm transition-all duration-300">
            <svg class="animate-spin h-16 w-16 text-blue-500 mb-6" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
            </svg>
            <p class="text-2xl md:text-3xl font-bold tracking-widest animate-pulse">AI 視覺解析中...</p>
        </div>
    </div>

    <div id="chat-window" class="absolute bottom-4 left-1/2 -translate-x-1/2 md:bottom-10 md:right-10 md:left-auto md:translate-x-0 w-[92vw] md:w-[400px] bg-white rounded-2xl shadow-2xl border border-gray-200 flex flex-col transition-all duration-300 z-50">
        <div id="chat-header" class="bg-blue-600 text-white p-4 rounded-t-2xl no-select flex justify-between items-center opacity-95">
            <div class="font-bold">導航 Agent 助手</div>
            <button onclick="toggleMinimize()" class="hover:bg-blue-700 p-1 rounded transition">
                <svg id="minimize-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 12H4" />
                </svg>
                <svg id="maximize-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M4 4h16v16H4V4z" />
                </svg>
            </button>
        </div>
        
        <div id="chat-body" class="flex flex-col h-[300px] md:h-[450px]">
            <div id="room-panel" class="bg-blue-50 p-3 border-b border-blue-100 flex flex-col gap-2 text-sm">
                <div id="no-room-ui" class="flex gap-2">
                    <button onclick="createRoom()" class="bg-blue-600 text-white px-3 py-1.5 rounded hover:bg-blue-700 font-bold transition">➕ 建立</button>
                    <input type="text" id="invite-input" placeholder="輸入邀請碼" class="border rounded px-2 flex-1 uppercase">
                    <button onclick="joinRoomFromInput()" class="bg-gray-200 text-gray-700 px-3 py-1.5 rounded hover:bg-gray-300 font-bold transition">加入</button>
                </div>
                <div id="in-room-ui" class="hidden flex justify-between items-center">
                    <div class="truncate">
                        <span class="text-gray-500">代碼：</span>
                        <span id="room-code-display" class="font-bold text-blue-700"></span>
                    </div>
                    <div class="flex gap-2 shrink-0">
                        <button id="start-tracking-btn" onclick="requestSensorAccess()" class="bg-green-600 text-white px-2 py-1 rounded text-xs hidden">📍 點此開始校正定位</button>
                        <button onclick="copyInviteLink()" class="text-blue-600 text-xs">📋 連結</button>
                    </div>
                </div>
            </div>

            <div id="chat-box" class="flex-1 p-4 overflow-y-auto space-y-4 bg-gray-50"></div>
            
            <div class="p-3 border-t border-gray-100 bg-white rounded-b-2xl">
                <div class="flex gap-2">
                    <input type="text" id="user-input" placeholder="對話框..." disabled class="flex-1 border rounded-xl px-3 py-2 text-sm focus:outline-none focus:border-blue-500">
                    <button id="send-btn" onclick="sendMessage()" disabled class="bg-gray-400 text-white px-4 py-2 rounded-xl text-sm font-bold transition">發送</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.0.0/socket.io.min.js"></script>
    <script src="/static/js/socket_log.js"></script>
    <script src="/static/js/pdr_engine.js"></script>
</body>
</html>
